<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH — ADMIN CONTROL PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .control-card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 18px; border-radius: 12px; margin-bottom: 8px; transition: all 0.3s; }
        .control-card:hover { border-color: #333; background: #0f0f0f; }
        select { background: #161616; color: white; border: 1px solid #333; padding: 6px 12px; border-radius: 8px; font-size: 12px; outline: none; cursor: pointer; }
        select:focus { border-color: #fff; }
    </style>
</head>
<body class="p-6 md:p-20">
    <div class="max-w-md mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-black italic tracking-tighter italic uppercase">RETH ADMIN HUB</h1>
            <p class="text-[10px] text-zinc-500 font-mono mt-2 tracking-[0.3em]">REMOTE STATUS CONTROLLER</p>
        </header>
        
        <div id="controls" class="space-y-3">
            <div class="control-card flex justify-between items-center">
                <span class="font-bold text-sm tracking-widest">DELTA</span>
                <select id="delta"><option value="Working">Working</option><option value="Patched">Patched</option></select>
            </div>
            <div class="control-card flex justify-between items-center">
                <span class="font-bold text-sm tracking-widest">CODEX</span>
                <select id="codex"><option value="Working">Working</option><option value="Patched">Patched</option></select>
            </div>
            <div class="control-card flex justify-between items-center">
                <span class="font-bold text-sm tracking-widest">ARCEUS X</span>
                <select id="arceus"><option value="Working">Working</option><option value="Patched">Patched</option></select>
            </div>
            <div class="control-card flex justify-between items-center">
                <span class="font-bold text-sm tracking-widest">TRIGON EVO</span>
                <select id="trigon"><option value="Working">Working</option><option value="Patched">Patched</option></select>
            </div>
            <div class="control-card flex justify-between items-center">
                <span class="font-bold text-sm tracking-widest">RONIX</span>
                <select id="ronix"><option value="Working">Working</option><option value="Patched">Patched</option></select>
            </div>
            <div class="control-card flex justify-between items-center">
                <span class="font-bold text-sm tracking-widest">XENO</span>
                <select id="xeno"><option value="Working">Working</option><option value="Patched">Patched</option></select>
            </div>
            <div class="control-card flex justify-between items-center">
                <span class="font-bold text-sm tracking-widest">VELOCITY</span>
                <select id="velocity"><option value="Working">Working</option><option value="Patched">Patched</option></select>
            </div>
        </div>

        <button onclick="updateStatus()" id="saveBtn" class="w-full bg-white text-black font-black py-4 rounded-xl mt-8 hover:bg-zinc-200 transition-all duration-300 shadow-[0_0_20px_rgba(255,255,255,0.1)] active:scale-95">
            UPDATE ALL STATUS
        </button>
        
        <p id="msg" class="text-center mt-6 text-[10px] font-mono uppercase tracking-widest"></p>
    </div>

    <script>
        // *** ใส่ข้อมูลของคุณตรงนี้ ***
        const GIST_ID = '7e89b2b9a578abf43c87ab8baccb8efc'; // ตัวอย่าง: 43c87ab8baccb8efc1... (ห้ามมี https://)
        const GITHUB_TOKEN = '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'; // ตัวอย่าง: github_pat_...

        async function updateStatus() {
            const btn = document.getElementById('saveBtn');
            const msg = document.getElementById('msg');
            
            // ป้องกันความผิดพลาดจากการใส่ GIST_ID ผิด
            if (GIST_ID.includes("http")) {
                alert("GIST_ID ผิด! ให้ใส่เฉพาะรหัสท้าย URL เท่านั้น (ห้ามใส่ลิงก์เต็ม)");
                return;
            }

            btn.disabled = true;
            btn.style.opacity = "0.5";
            msg.style.color = "#71717a";
            msg.innerText = "Syncing with GitHub Cloud...";

            const newData = {
                delta: document.getElementById('delta').value,
                codex: document.getElementById('codex').value,
                arceus: document.getElementById('arceus').value,
                trigon: document.getElementById('trigon').value,
                ronix: document.getElementById('ronix').value,
                xeno: document.getElementById('xeno').value,
                velocity: document.getElementById('velocity').value
            };

            try {
                const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github+json',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        files: {
                            "status.json": {
                                content: JSON.stringify(newData, null, 2)
                            }
                        }
                    })
                });

                if (response.ok) {
                    msg.style.color = "#22c55e"; // สีเขียว
                    msg.innerText = "SUCCESS: STATUS UPDATED!";
                    setTimeout(() => { msg.innerText = ""; }, 4000);
                } else {
                    const err = await response.json();
                    msg.style.color = "#ef4444"; // สีแดง
                    msg.innerText = "FAILED: " + (err.message || "Unauthorized");
                    console.error("API Error:", err);
                }
            } catch (err) {
                msg.style.color = "#ef4444";
                msg.innerText = "NETWORK ERROR: CHECK CONNECTION";
                console.error("Network Error:", err);
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
